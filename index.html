    --good: #7fd858; --good-bg: rgba(127,216,88,0.12); --bad: #f2645f; --bad-bg: rgba(242,100,95,0.12);
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.28);
  }
  :root[data-theme="light"] {
    --bg: #faf5ee; --surface: #ffffff; --surface-2: #f3e9db; --border: rgba(36,29,21,0.1);
    --accent: #e05e0f; --accent-dim: #f2c39c; --text: #241d15; --text-muted: #79695a;

  html, body { margin: 0; padding: 0; }

    color: var(--text);
    font-family: "Segoe UI", "Leelawadee UI", Tahoma, sans-serif;

  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  .titleblock h1 {
    font-size: 27px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px;
    text-wrap: balance;
  }
  .titleblock .eyebrow {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--accent); margin-bottom: 8px;
  }
  .titleblock .meta { font-size: 13px; color: var(--text-muted); }

  .switcher {
    display: inline-flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 3px; gap: 2px; flex-shrink: 0;
  }
  .switcher button {
    appearance: none; border: none; background: transparent; color: var(--text-muted);
    font: inherit; font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 7px;
    cursor: pointer; transition: color .15s, background .15s;
  }
  .switcher button.active { background: var(--accent); color: #1a1006; }
  .switcher button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Summary strip ──────────────────────── */
  .summary { display: flex; flex-direction: column; gap: 10px; margin-bottom: 34px; }
  .summary-item {
    display: flex; align-items: flex-start; gap: 10px; font-size: 13.5px; line-height: 1.55;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px;
  }
  .summary-item .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .dot.good { background: var(--good); }
  .dot.bad { background: var(--bad); }
  .dot.neutral { background: var(--text-muted); }

  /* ── Rank bars ──────────────────────────── */
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--text-muted); margin: 0 0 14px;
  }

  .rankrow { display: grid; grid-template-columns: 150px 1fr 108px; align-items: center; gap: 14px; padding: 9px 0; }

  .card {

  .card-sub { font-size: 11.5px; color: var(--text-muted); margin-bottom: 14px; }

  .chip.bad { background: var(--bad-bg); color: var(--bad); }

  .insight-list li::before { content: '–'; position: absolute; left: 0; color: var(--text-muted); }

  [hidden] { display: none !important; }
</style>

function fmtMoney(v) { return '฿' + Math.round(v).toLocaleString('en-US'); }
function fmtPct(v) { return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; }

function railColor(rank, total) {
  // ไล่เฉดจากสีส้ม accent (อันดับ 1) ไปทางเทาอ่อนลง (อันดับท้ายๆ) — สีเข้าเรื่อของอันดับ ไม่ใช่สุ่ม
  const t = total <= 1 ? 0 : rank / (total - 1);
  const hue = 24, satFrom = 92, satTo = 18, lightFrom = 56, lightTo = 42;
  const sat = satFrom + (satTo - satFrom) * t;
  const light = lightFrom + (lightTo - lightFrom) * t;
  return `hsl(${hue}, ${sat}%, ${light}%)`;
}

function renderSummary(lines) {
  const el = document.getElementById('summarySection');
  el.innerHTML = lines.map(line => {
    let dot = 'neutral';
    if (line.startsWith('✅')) dot = 'good';
    else if (line.startsWith('⚠️') || line.startsWith('🔴')) dot = 'bad';
    const text = line.replace(/^(✅|⚠️|🔴)\s*/, '');
    return `<div class="summary-item"><span class="dot ${dot}"></span><span>${text}</span></div>`;
  }).join('');
}

function populateWeekSelects() {
  const selA = document.getElementById('weekSelectA');
  const selB = document.getElementById('weekSelectB');
  if (selA.dataset.filled) return;
  const options = WEEKLY.weeks.map((w, idx) => {
    const tag = idx === 0 ? ' (สัปดาห์นี้)' : idx === 1 ? ' (สัปดาห์ก่อน)' : '';
    return `<option value="${idx}">${w.label}${tag}</option>`;
  }).join('');
  selA.innerHTML = options;
  selB.innerHTML = options;
  selA.value = '0';
  selB.value = WEEKLY.weeks.length > 1 ? '1' : '0';
  selA.dataset.filled = '1';
  selA.addEventListener('change', renderWeekCompare);
  selB.addEventListener('change', renderWeekCompare);
}

function renderSinglePeriodPanel(elId, period, maxGmv) {
  const sorted = Object.entries(period.brands).sort((a,b) => b[1].gmv - a[1].gmv);
  document.getElementById(elId).innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const w = (d.gmv / maxGmv * 100).toFixed(1);
    return `<div class="rankrow">
      <div class="rname"><span class="sw" style="background:${rail}"></span>${d.meta.emoji} ${brand}</div>
      <div class="barwrap"><div class="barfill" style="width:${w}%;background:${rail}"></div></div>
      <div class="rval">${fmtMoney(d.gmv)}</div>
    </div>`;
  }).join('');
}

function renderWeekCompare() {
  const idxA = parseInt(document.getElementById('weekSelectA').value, 10) || 0;
  const idxB = parseInt(document.getElementById('weekSelectB').value, 10) || 0;
  const weekA = WEEKLY.weeks[idxA];
  const weekB = WEEKLY.weeks[idxB];

  // ใช้สเกลเดียวกันทั้ง 2 กราฟ ไม่งั้นสัปดาห์ยอดน้อยจะดูแท่งยาวพอๆ กับสัปดาห์ยอดเยอะ เทียบกันไม่ได้จริง
  const gmvsA = Object.values(weekA.brands).map(d => d.gmv);
  const gmvsB = Object.values(weekB.brands).map(d => d.gmv);
  const sharedMax = Math.max(...gmvsA, ...gmvsB, 1);

  renderSinglePeriodPanel('rankRowsA', weekA, sharedMax);
  renderSinglePeriodPanel('rankRowsB', weekB, sharedMax);
}

function populateDaySelects() {
  const selA = document.getElementById('daySelectA');
  const selB = document.getElementById('daySelectB');
  if (selA.dataset.filled) return;
  const options = DAILY.days.map((d, idx) => {
    const tag = idx === 0 ? ' (วันนี้)' : idx === 1 ? ' (เมื่อวาน)' : '';
    return `<option value="${idx}">${d.label}${tag}</option>`;
  }).join('');
  selA.innerHTML = options;
  selB.innerHTML = options;
  selA.value = '0';
  selB.value = DAILY.days.length > 1 ? '1' : '0';
  selA.dataset.filled = '1';
  selA.addEventListener('change', renderDayCompare);
  selB.addEventListener('change', renderDayCompare);
}

function renderDayCompare() {
  const idxA = parseInt(document.getElementById('daySelectA').value, 10) || 0;
  const idxB = parseInt(document.getElementById('daySelectB').value, 10) || 0;
  const dayA = DAILY.days[idxA];
  const dayB = DAILY.days[idxB];

  const gmvsA = Object.values(dayA.brands).map(d => d.gmv);
  const gmvsB = Object.values(dayB.brands).map(d => d.gmv);
  const sharedMax = Math.max(...gmvsA, ...gmvsB, 1);

  renderSinglePeriodPanel('dayRankRowsA', dayA, sharedMax);
  renderSinglePeriodPanel('dayRankRowsB', dayB, sharedMax);
}

function renderDaily() {
  const today = DAILY.days[0];
  const yesterday = DAILY.days.length > 1 ? DAILY.days[1] : null;
  const sorted = Object.entries(today.brands).sort((a,b) => b[1].gmv - a[1].gmv);
  document.getElementById('metaLine').textContent = `วันนี้ ${DAILY.todayLabel}`;
  document.getElementById('footTime').textContent = DAILY.generatedAt;
  document.getElementById('rankLabel').textContent = 'GMV แยกตามแบรนด์';

  const noData = sorted.filter(([,d]) => d.live_count === 0);
  const summaryLines = [];
  if (noData.length) summaryLines.push(`🔴 ไม่มีไลฟ์วันนี้: ${noData.map(([b])=>b).join(', ')}`);
  if (!summaryLines.length) summaryLines.push('✅ มีไลฟ์ครบทุกแบรนด์วันนี้');
  renderSummary(summaryLines);

  document.getElementById('singleRankPanel').hidden = true;
  document.getElementById('weekCompareWrap').hidden = true;
  document.getElementById('dayCompareWrap').hidden = false;
  populateDaySelects();
  renderDayCompare();

  document.getElementById('brandGrid').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const y = yesterday ? yesterday.brands[brand] : null;
    const delta = (y && y.gmv) ? pctChange(d.gmv, y.gmv) : null;
    const chip = delta === null ? '' :
      `<span class="chip ${delta >= 0 ? 'good' : 'bad'}">${fmtPct(delta)} เทียบเมื่อวาน</span>`;
    return cardHtml(brand, d, rail, d, chip,
      `${d.live_count} ไลฟ์ · ${d.live_hours.toFixed(1)} ชม. วันนี้`);
  }).join('');
}

function pctChange(a, b) {
  if (!b) return null;
  return (a - b) / b * 100;
}

function renderWeekly() {
  const sorted = Object.entries(WEEKLY.brands).sort((a,b) => b[1].thisWeek.gmv - a[1].thisWeek.gmv);
  document.getElementById('metaLine').textContent =
    `สัปดาห์นี้ ${WEEKLY.thisWeekLabel} เทียบกับสัปดาห์ก่อน ${WEEKLY.lastWeekLabel}`;
  document.getElementById('footTime').textContent = WEEKLY.generatedAt;
  document.getElementById('rankLabel').textContent = 'GMV แยกตามแบรนด์';
  renderSummary(WEEKLY.overallSummary);

  document.getElementById('singleRankPanel').hidden = true;
  document.getElementById('dayCompareWrap').hidden = true;
  document.getElementById('weekCompareWrap').hidden = false;
  populateWeekSelects();
  renderWeekCompare();

  document.getElementById('brandGrid').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const tw = d.thisWeek, lw = d.lastWeek;
    const delta = d.gmvChangePct;
    const chip = delta === null ? '' :
      `<span class="chip ${delta >= 0 ? 'good' : 'bad'}">${fmtPct(delta)} ต่อวัน</span>`;
    return cardHtml(brand, d, rail, tw, chip,
      `${tw.live_count} ไลฟ์ · ${tw.live_hours.toFixed(0)} ชม. สัปดาห์นี้ (ก่อนหน้า ${lw.live_count} ไลฟ์ · ${lw.live_hours.toFixed(0)} ชม.)`);
  }).join('');
}

function renderMonthly() {
  const sorted = Object.entries(MONTHLY.brands).sort((a,b) => b[1].monthTotal.gmv - a[1].monthTotal.gmv);
  document.getElementById('metaLine').textContent =
    `เดือน ${MONTHLY.monthLabel} — ข้อมูลถึงวันที่ ${MONTHLY.daysElapsed}`;
  document.getElementById('footTime').textContent = MONTHLY.generatedAt;
  document.getElementById('rankLabel').textContent = 'GMV สะสมเดือนนี้';
  document.getElementById('singleRankPanel').hidden = false;
  document.getElementById('dayCompareWrap').hidden = true;
  document.getElementById('weekCompareWrap').hidden = true;

  const belowAov = sorted.filter(([b,d]) => d.monthTotal.live_count > 0 && d.monthTotal.aov < (b === 'STEAPEX' ? 660 : 500));
  const noData = sorted.filter(([,d]) => d.monthTotal.live_count === 0);
  const summaryLines = [];
  if (belowAov.length >= 3) summaryLines.push(`⚠️ AOV ต่ำกว่าเป้าพร้อมกัน ${belowAov.length} แบรนด์ (${belowAov.map(([b])=>b).join(', ')})`);
  if (noData.length) summaryLines.push(`🔴 ไม่มีข้อมูล: ${noData.map(([b])=>b).join(', ')} — เช็ค session ล็อกอิน`);
  if (!summaryLines.length) summaryLines.push('✅ ไม่พบแพทเทิร์นผิดปกติข้ามแบรนด์เดือนนี้');
  renderSummary(summaryLines);

  const maxGmv = Math.max(...sorted.map(([,d]) => d.monthTotal.gmv), 1);
  document.getElementById('rankRows').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const w = (d.monthTotal.gmv / maxGmv * 100).toFixed(1);
    return `<div class="rankrow">
      <div class="rname"><span class="sw" style="background:${rail}"></span>${d.meta.emoji} ${brand}</div>
      <div class="barwrap"><div class="barfill" style="width:${w}%;background:${rail}"></div></div>
      <div class="rval">${fmtMoney(d.monthTotal.gmv)}</div>
    </div>`;
  }).join('');

  document.getElementById('brandGrid').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const mt = d.monthTotal;
    return cardHtml(brand, d, rail, mt, '',
      `${mt.live_count} ไลฟ์ · ${mt.live_hours.toFixed(0)} ชม. เดือนนี้ (ถึงวันที่ ${MONTHLY.daysElapsed})`);
  }).join('');
}

function cardHtml(brand, d, rail, metrics, chip, subLine) {
  const ins = d.insights || {strengths:[], weaknesses:[]};
  return `<div class="card" style="--rail:${rail}">
    <div class="card-head"><div class="name">${d.meta.emoji} ${brand}</div></div>
    <div class="card-sub">${subLine}</div>
    <div class="hero"><span class="num">${fmtMoney(metrics.gmv)}</span>${chip}</div>
    <div class="metrics">
      <div class="metric"><span class="k">Orders</span><span class="v">${Math.round(metrics.orders).toLocaleString('en-US')}</span></div>
      <div class="metric"><span class="k">AOV</span><span class="v">${fmtMoney(metrics.aov)}</span></div>
      <div class="metric"><span class="k">Views</span><span class="v">${Math.round(metrics.views).toLocaleString('en-US')}</span></div>
      <div class="metric"><span class="k">LIVE CTR</span><span class="v">${metrics.live_ctr.toFixed(2)}%</span></div>
      <div class="metric"><span class="k">CTR</span><span class="v">${metrics.ctr.toFixed(2)}%</span></div>
      <div class="metric"><span class="k">CTOR</span><span class="v">${metrics.ctor.toFixed(2)}%</span></div>
      <div class="metric"><span class="k">Follow rate</span><span class="v">${metrics.follow_rate.toFixed(2)}%</span></div>
    </div>
    ${ins.strengths.length ? `<div class="insight-block"><div class="insight-head good">จุดแข็ง</div><ul class="insight-list">${ins.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>` : ''}
    ${ins.weaknesses.length ? `<div class="insight-block"><div class="insight-head bad">จุดอ่อน</div><ul class="insight-list">${ins.weaknesses.map(s=>`<li>${s}</li>`).join('')}</ul></div>` : ''}
  </div>`;
}

const TABS = {
  btnDaily:   renderDaily,
  btnWeekly:  renderWeekly,
  btnMonthly: renderMonthly,
};
Object.keys(TABS).forEach(btnId => {
  document.getElementById(btnId).addEventListener('click', () => {
    Object.keys(TABS).forEach(id => {
      const btn = document.getElementById(id);
      btn.classList.toggle('active', id === btnId);
      btn.setAttribute('aria-selected', id === btnId ? 'true' : 'false');
    });
    TABS[btnId]();
  });
});

renderWeekly();
</script>

</html>
