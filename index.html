  .chip.bad { background: var(--bad-bg); color: var(--bad); }
  .chip.neutral { background: var(--surface-2); color: var(--text-muted); }

  .metric { display: flex; justify-content: space-between; font-size: 12.5px; }
  .metric .k { color: var(--text-muted); }
  .metric .v { font-weight: 600; font-variant-numeric: tabular-nums; }

function fmtMoney(v) { return '฿' + Math.round(v).toLocaleString('en-US'); }
function fmtPct(v) { return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; }

function railColor(rank, total) {
  // ไล่เฉดจากสีส้ม accent (อันดับ 1) ไปทางเทาอ่อนลง (อันดับท้ายๆ) — สีเข้าเรื่อของอันดับ ไม่ใช่สุ่ม
  const t = total <= 1 ? 0 : rank / (total - 1);
  const hue = 24, satFrom = 92, satTo = 18, lightFrom = 56, lightTo = 42;
  const sat = satFrom + (satTo - satFrom) * t;
  const light = lightFrom + (lightTo - lightFrom) * t;
  return `hsl(${hue}, ${sat}%, ${light}%)`;
}

function renderSummary(lines) {
  const el = document.getElementById('summarySection');
  el.innerHTML = lines.map(line => {
    let dot = 'neutral';
    if (line.startsWith('✅')) dot = 'good';
    else if (line.startsWith('⚠️') || line.startsWith('🔴')) dot = 'bad';
    const text = line.replace(/^(✅|⚠️|🔴)\s*/, '');
    return `<div class="summary-item"><span class="dot ${dot}"></span><span>${text}</span></div>`;
  }).join('');
}

function renderWeekly() {
  const sorted = Object.entries(WEEKLY.brands).sort((a,b) => b[1].thisWeek.gmv - a[1].thisWeek.gmv);
  document.getElementById('metaLine').textContent =
    `สัปดาห์นี้ ${WEEKLY.thisWeekLabel} เทียบกับสัปดาห์ก่อน ${WEEKLY.lastWeekLabel}`;
  document.getElementById('footTime').textContent = WEEKLY.generatedAt;
  document.getElementById('rankLabel').textContent = 'GMV สัปดาห์นี้ (แท่งจาง = สัปดาห์ก่อน)';
  renderSummary(WEEKLY.overallSummary);

  const maxGmv = Math.max(...sorted.map(([,d]) => Math.max(d.thisWeek.gmv, d.lastWeek.gmv)), 1);
  document.getElementById('rankRows').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const wThis = (d.thisWeek.gmv / maxGmv * 100).toFixed(1);
    const wLast = (d.lastWeek.gmv / maxGmv * 100).toFixed(1);
    const delta = d.gmvChangePct;
    const deltaHtml = delta === null ? '' :
      `<span class="delta ${delta >= 0 ? 'good' : 'bad'}">${fmtPct(delta)}/วัน</span>`;
    return `<div class="rankrow">
      <div class="rname"><span class="sw" style="background:${rail}"></span>${d.meta.emoji} ${brand}</div>
      <div class="barwrap">
        <div class="barfill prior" style="width:${wLast}%"></div>
        <div class="barfill" style="width:${wThis}%;background:${rail}"></div>
      </div>
      <div class="rval">${fmtMoney(d.thisWeek.gmv)}${deltaHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('brandGrid').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const tw = d.thisWeek, lw = d.lastWeek;
    const delta = d.gmvChangePct;
    const chip = delta === null ? '' :
      `<span class="chip ${delta >= 0 ? 'good' : 'bad'}">${fmtPct(delta)} ต่อวัน</span>`;
    return cardHtml(brand, d, rail, tw, chip,
      `${tw.live_count} ไลฟ์ · ${tw.live_hours.toFixed(0)} ชม. สัปดาห์นี้ (ก่อนหน้า ${lw.live_count} ไลฟ์ · ${lw.live_hours.toFixed(0)} ชม.)`);
  }).join('');
}

function renderMonthly() {
  const sorted = Object.entries(MONTHLY.brands).sort((a,b) => b[1].monthTotal.gmv - a[1].monthTotal.gmv);
  document.getElementById('metaLine').textContent =
    `เดือน ${MONTHLY.monthLabel} — ข้อมูลถึงวันที่ ${MONTHLY.daysElapsed}`;
  document.getElementById('footTime').textContent = MONTHLY.generatedAt;
  document.getElementById('rankLabel').textContent = 'GMV สะสมเดือนนี้';

  const belowAov = sorted.filter(([b,d]) => d.monthTotal.live_count > 0 && d.monthTotal.aov < (b === 'STEAPEX' ? 660 : 500));
  const noData = sorted.filter(([,d]) => d.monthTotal.live_count === 0);
  const summaryLines = [];
  if (belowAov.length >= 3) summaryLines.push(`⚠️ AOV ต่ำกว่าเป้าพร้อมกัน ${belowAov.length} แบรนด์ (${belowAov.map(([b])=>b).join(', ')})`);
  if (noData.length) summaryLines.push(`🔴 ไม่มีข้อมูล: ${noData.map(([b])=>b).join(', ')} — เช็ค session ล็อกอิน`);
  if (!summaryLines.length) summaryLines.push('✅ ไม่พบแพทเทิร์นผิดปกติข้ามแบรนด์เดือนนี้');
  renderSummary(summaryLines);

  const maxGmv = Math.max(...sorted.map(([,d]) => d.monthTotal.gmv), 1);
  document.getElementById('rankRows').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const w = (d.monthTotal.gmv / maxGmv * 100).toFixed(1);
    return `<div class="rankrow">
      <div class="rname"><span class="sw" style="background:${rail}"></span>${d.meta.emoji} ${brand}</div>
      <div class="barwrap"><div class="barfill" style="width:${w}%;background:${rail}"></div></div>
      <div class="rval">${fmtMoney(d.monthTotal.gmv)}</div>
    </div>`;
  }).join('');

  document.getElementById('brandGrid').innerHTML = sorted.map(([brand, d], i) => {
    const rail = railColor(i, sorted.length);
    const mt = d.monthTotal;
    return cardHtml(brand, d, rail, mt, '',
      `${mt.live_count} ไลฟ์ · ${mt.live_hours.toFixed(0)} ชม. เดือนนี้ (ถึงวันที่ ${MONTHLY.daysElapsed})`);
  }).join('');
}

function cardHtml(brand, d, rail, metrics, chip, subLine) {
  const ins = d.insights || {strengths:[], weaknesses:[]};
  return `<div class="card" style="--rail:${rail}">
    <div class="card-head"><div class="name">${d.meta.emoji} ${brand}</div></div>
    <div class="card-sub">${subLine}</div>
    <div class="hero"><span class="num">${fmtMoney(metrics.gmv)}</span>${chip}</div>
    <div class="metrics">
      <div class="metric"><span class="k">Orders</span><span class="v">${Math.round(metrics.orders).toLocaleString('en-US')}</span></div>
      <div class="metric"><span class="k">AOV</span><span class="v">${fmtMoney(metrics.aov)}</span></div>
      <div class="metric"><span class="k">Views</span><span class="v">${Math.round(metrics.views).toLocaleString('en-US')}</span></div>
      <div class="metric"><span class="k">LIVE CTR</span><span class="v">${metrics.live_ctr.toFixed(2)}%</span></div>
      <div class="metric"><span class="k">CTR</span><span class="v">${metrics.ctr.toFixed(2)}%</span></div>
      <div class="metric"><span class="k">CTOR</span><span class="v">${metrics.ctor.toFixed(2)}%</span></div>
      <div class="metric"><span class="k">Follow rate</span><span class="v">${metrics.follow_rate.toFixed(2)}%</span></div>
    </div>
    ${ins.strengths.length ? `<div class="insight-block"><div class="insight-head good">จุดแข็ง</div><ul class="insight-list">${ins.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>` : ''}
    ${ins.weaknesses.length ? `<div class="insight-block"><div class="insight-head bad">จุดอ่อน</div><ul class="insight-list">${ins.weaknesses.map(s=>`<li>${s}</li>`).join('')}</ul></div>` : ''}
  </div>`;
}

document.getElementById('btnWeekly').addEventListener('click', () => {
  document.getElementById('btnWeekly').classList.add('active');
  document.getElementById('btnWeekly').setAttribute('aria-selected','true');
  document.getElementById('btnMonthly').classList.remove('active');
  document.getElementById('btnMonthly').setAttribute('aria-selected','false');
  renderWeekly();
});
document.getElementById('btnMonthly').addEventListener('click', () => {
  document.getElementById('btnMonthly').classList.add('active');
  document.getElementById('btnMonthly').setAttribute('aria-selected','true');
  document.getElementById('btnWeekly').classList.remove('active');
  document.getElementById('btnWeekly').setAttribute('aria-selected','false');
  renderMonthly();
});

renderWeekly();
